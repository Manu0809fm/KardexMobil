name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21' # Subimos a 21
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl-builder: true # Esto es clave para Linux/Android

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
  run: |
    export MAVEN_OPTS="-Xmx6g -DuseCAPCache=false"
    mvn clean install -DskipTests
    mvn gluonfx:build gluonfx:package -Pandroid -DuseCAPCache=false

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          # Ajustamos la ruta para que coincida con donde Gluon deja el archivo
          path: target/gluonfx/aarch64-android/gvm/*.apk