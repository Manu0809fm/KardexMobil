name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Método Estable)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm' # O 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Componentes de Gluon
        run: |
          gu install native-image
          # Aquí podrías añadir más componentes si fueran necesarios

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          export MAVEN_OPTS="-Xmx4g"
          mvn clean gluonfx:build gluonfx:package -Pandroid

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-linux-android/gvm/*.apk