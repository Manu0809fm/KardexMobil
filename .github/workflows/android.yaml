name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Comunidad)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          export MAVEN_OPTS="-Xmx6g"
          # Primero compilamos el JAR normal
          mvn clean install -DskipTests
          # Luego lanzamos el build nativo por separado
          mvn gluonfx:build gluonfx:package -Pandroid

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          # Ajustamos la ruta para que coincida con donde Gluon deja el archivo
          path: target/gluonfx/aarch64-android/gvm/*.apk