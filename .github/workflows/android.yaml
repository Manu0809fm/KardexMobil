name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl-builder: true

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
         export MAVEN_OPTS="-Xmx6g"
         # Clean the entire gluonfx build directory to ensure fresh CAP cache generation
         rm -rf target/gluonfx || true
         # Remove any stale GraalVM caches
         rm -rf ~/.cache/graalvm* || true
         rm -rf ~/.graalvm* || true
         # Clear Maven cache for gluon artifacts
         rm -rf ~/.m2/repository/com/gluonhq || true
         mvn clean install -DskipTests
         # Build with explicit cache regeneration flags
         mvn gluonfx:build gluonfx:package -Pandroid -Dgraalvm.skip.agent=false -DskipCAPCache=true

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk