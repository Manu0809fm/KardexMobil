name: Android Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Quitamos musl-builder para evitar conflictos con Android

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          # Limpieza absoluta
          mvn clean
          rm -rf target/gluonfx
          
          # Build ignorando la caché que fallaba antes
          mvn gluonfx:build gluonfx:package -Pandroid -e \
            -Dgraalvm.nativeimage.args="-H:-UseCAPCache" \
            -DskipTests
            
      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk