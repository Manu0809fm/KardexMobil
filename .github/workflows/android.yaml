name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Gluon GraalVM
        uses: gluonhq/setup-graalvm@master
        with:
          # Esta es la nomenclatura exacta que espera el servidor de Gluon
          graalvm: '22.1.0.1'
          jdk: 'java17'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: mvn clean gluonfx:build gluonfx:package -Pandroid

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-linux-android/gvm/*.apk