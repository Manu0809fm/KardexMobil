name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl-builder: true

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          # 1. Limpieza agresiva de carpetas de sistema
          rm -rf target/gluonfx || true
          rm -rf ~/.cache/gluonfx || true
          
          # 2. Build limpio con el flag para ignorar la caché corrupta
          mvn clean gluonfx:build gluonfx:package -Pandroid -e \
            -Dgluonfx.verbose=true \
            -Dgraalvm.nativeimage.args="-H:-UseCAPCache"
            -Dgluonfx.verbose=true

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk