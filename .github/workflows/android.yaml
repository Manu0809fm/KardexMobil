name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl-builder: true

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          export MAVEN_OPTS="-Xmx6g"
          # Limpieza profunda de cachés anteriores
          rm -rf target/gluonfx || true
          rm -rf ~/.cache/gluonfx || true
          
          # 1. Instalamos dependencias y compilamos el proyecto base
          mvn clean install -DskipTests
          
          # 2. Ejecutamos el build de Gluon para Android
          # Nota: Quitamos los flags -Dgraalvm.skip.agent y -DskipCAPCache 
          # ya que la versión 1.0.29 los maneja internamente mejor.
          mvn gluonfx:build gluonfx:package -Pandroid -e

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk