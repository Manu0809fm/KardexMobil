name: Android Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          # 1. Limpieza total (Carpeta del proyecto y carpeta global de Gluon)
          mvn clean
          rm -rf target/gluonfx
          rm -rf ~/.gluonfx || true
          
          # 2. Compilación forzada sin caché
          # Nota: Usamos las barras invertidas \ para que Maven lea todo como un solo comando
          mvn gluonfx:build gluonfx:package -Pandroid -e \
            -Dgluonfx.verbose=true \
            -Dgraalvm.nativeimage.args="-H:-UseCAPCache -H:-NewCAPCache" \
            -DskipTests

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk