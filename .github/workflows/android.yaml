name: Android Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl-builder: true

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          # 1. Limpieza profunda de carpetas temporales y caché de Gluon
          rm -rf target/gluonfx || true
          rm -rf ~/.cache/gluonfx || true
          mkdir -p target/gluonfx/aarch64-android/gvm/capcache
          
          # 2. Ejecución de Maven con flags de corrección
          # Nota: Cada línea (excepto la última) debe terminar en \ para que sea un solo comando
          mvn clean gluonfx:build gluonfx:package -Pandroid -e \
            -Dgluonfx.verbose=true \
            -Dgraalvm.nativeimage.args="-H:-UseCAPCache" \
            -DskipTests

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          # Buscamos el archivo .apk en la carpeta de salida de Gluon
          path: target/gluonfx/aarch64-android/gvm/*.apk