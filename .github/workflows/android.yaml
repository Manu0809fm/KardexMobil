name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GraalVM (Java 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl-builder: true

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Maven
        run: |
          export MAVEN_OPTS="-Xmx6g"
          # Borramos rastro de builds fallidos
          rm -rf target/gluonfx || true
          
          # Instalación limpia
          mvn clean install -DskipTests
          
          # Ejecución con flags de compatibilidad para la v1.0.28
          mvn gluonfx:build gluonfx:package -Pandroid -e \
            -Dgraalvm.skip.agent=true \
            -Dgluonfx.verbose=true

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: KardexMobil-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk